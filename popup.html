<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping List</title>

    <!-- Font Awesome: provides the trash icon used on each delete button -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>

    <h2>🛒 Shopping List</h2>

    <!-- ------------------------------------------------------------------ -->
    <!-- PREVIEW BOX                                                         -->
    <!-- Shows the current tab's truncated title so the user knows exactly  -->
    <!-- which item they are about to save before picking a category.        -->
    <!-- ------------------------------------------------------------------ -->
    <div id="preview-box">
      <p class="preview-label">Item Preview:</p>
      <p id="preview-title">Loading...</p>
    </div>

    <!-- ------------------------------------------------------------------ -->
    <!-- CONTROLS                                                            -->
    <!-- ------------------------------------------------------------------ -->
    <label for="category">Category:</label>
    <select id="category">
      <option value="Books">📚 Books</option>
      <option value="Clothes">👗 Clothes</option>
      <option value="Shoes">👟 Shoes</option>
      <option value="Electronics">💻 Electronics</option>
      <option value="Pets">🐾 Pets</option>
      <option value="Health">💊 Health</option>
    </select>

    <button id="save-btn">Save Item</button>

    <!-- ------------------------------------------------------------------ -->
    <!-- CATEGORISED LIST CONTAINER                                          -->
    <!-- popup.js dynamically injects one .category-section per category    -->
    <!-- that has at least one saved item. Empty categories are hidden.      -->
    <!-- ------------------------------------------------------------------ -->
    <div id="categories-container"></div>

    <script src="popup.js"></script>
  </body>
</html>
